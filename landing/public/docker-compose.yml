# ============================================================
# Utterlog — production compose (single-file, pull-only)
# ------------------------------------------------------------
# Published at https://utterlog.io/docker-compose.yml. The install.sh
# one-liner fetches this file and runs `docker compose up -d` — no
# local build, no source checkout, no toolchain needed.
#
# Data / config / uploads live on the host and survive image upgrades:
#   ./pgdata/   — PostgreSQL data (NEVER wiped by compose commands)
#   ./uploads/  — user-uploaded media + custom themes
#   ./.env      — all configuration (random DB_PASSWORD, JWT_SECRET)
#
# Image source selection (set in .env):
#   UTTERLOG_IMAGE_PREFIX=registry.utterlog.io/utterlog  (default, CN-fast)
#   UTTERLOG_IMAGE_PREFIX=ghcr.io/utterlog               (GitHub fallback)
#   UTTERLOG_IMAGE_TAG=latest   (or pinned sha-xxxxxxx / v1.2.3 for rollback)
# ============================================================

services:
  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-utterlog}
      POSTGRES_USER: ${DB_USER:-utterlog}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Run install.sh or set DB_PASSWORD in .env}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    volumes:
      - ./pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-utterlog} -d ${DB_NAME:-utterlog}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    image: ${UTTERLOG_IMAGE_PREFIX:-registry.utterlog.io/utterlog}/utterlog-api:${UTTERLOG_IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      # Bind to loopback only — put your nginx/caddy in front for public access.
      - "127.0.0.1:${UTTERLOG_PORT:-9260}:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-utterlog}
      - DB_USER=${DB_USER:-utterlog}
      - DB_PASSWORD=${DB_PASSWORD:?Run install.sh or set DB_PASSWORD in .env}
      - DB_PREFIX=${DB_PREFIX:-ul_}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:?Run install.sh or set JWT_SECRET in .env}
      - APP_URL=${APP_URL:-http://127.0.0.1:${UTTERLOG_PORT:-9260}}
      - STORAGE_DRIVER=${STORAGE_DRIVER:-local}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_REGION=${S3_REGION:-auto}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL:-}
      - WEB_PROXY_TARGET=http://web:3000
      # One-click upgrade needs the install dir mapped 1:1 to host path.
      - UTTERLOG_INSTALL_DIR=${UTTERLOG_INSTALL_DIR:-/opt/utterlog}
    volumes:
      - ./uploads:/app/public/uploads
      # One-click update feature (admin → "版本" → 一键升级) shells out
      # to `docker compose` on the host via the mounted socket.
      - /var/run/docker.sock:/var/run/docker.sock
      - ${UTTERLOG_INSTALL_DIR:-/opt/utterlog}:${UTTERLOG_INSTALL_DIR:-/opt/utterlog}:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  web:
    image: ${UTTERLOG_IMAGE_PREFIX:-registry.utterlog.io/utterlog}/utterlog-web:${UTTERLOG_IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - INTERNAL_API_URL=http://api:8080/api/v1
