# ============================================================
# Utterlog — pull pre-built images (overlay for docker-compose.prod.yml)
# ------------------------------------------------------------
# Replaces local `build:` directives with pre-built images. Skips all
# compilation on the deploy host — ideal for low-memory VPS.
#
# Usage:
#   docker compose -f docker-compose.prod.yml -f docker-compose.pull.yml pull
#   docker compose -f docker-compose.prod.yml -f docker-compose.pull.yml up -d
#
# Image source selection (set in .env or exported env):
#   UTTERLOG_IMAGE_PREFIX=ghcr.io/utterlog                # default, authoritative
#   UTTERLOG_IMAGE_PREFIX=registry.utterlog.io/utterlog   # optional mirror
#   UTTERLOG_IMAGE_TAG=latest                             # or a specific sha-xxxxxxx / v1.2.3
#
# Images are built by .github/workflows/docker-publish.yml on every
# push to main. Installer/upgrade scripts probe registry.utterlog.io
# first when it is healthy, then fall back to GHCR without hanging.
# ============================================================

services:
  api:
    image: ${UTTERLOG_IMAGE_PREFIX:-ghcr.io/utterlog}/utterlog-api:${UTTERLOG_IMAGE_TAG:-latest}
    build: !reset null     # disable local build
    pull_policy: always

  web:
    image: ${UTTERLOG_IMAGE_PREFIX:-ghcr.io/utterlog}/utterlog-web:${UTTERLOG_IMAGE_TAG:-latest}
    build: !reset null
    pull_policy: always
