# ============================================================
# Utterlog — pull pre-built images (overlay for docker-compose.prod.yml)
# ------------------------------------------------------------
# Replaces local `build:` directives with pre-built images from the
# Utterlog registry. Skips all compilation on the deploy host —
# ideal for low-memory VPS and for CN users who benefit from the
# Cloudflare-accelerated utterlog.io mirror.
#
# Usage:
#   docker compose -f docker-compose.prod.yml -f docker-compose.pull.yml pull
#   docker compose -f docker-compose.prod.yml -f docker-compose.pull.yml up -d
#
# Image source selection (set in .env or exported env):
#   UTTERLOG_IMAGE_PREFIX=registry.utterlog.io/utterlog   # default (CF-accelerated)
#   UTTERLOG_IMAGE_PREFIX=ghcr.io/utterlog                # fallback (GitHub)
#   UTTERLOG_IMAGE_TAG=latest                             # or a specific sha-xxxxxxx / v1.2.3
#
# Images are built by .github/workflows/docker-publish.yml on every
# push to main and pushed to BOTH registries simultaneously.
# ============================================================

services:
  api:
    image: ${UTTERLOG_IMAGE_PREFIX:-registry.utterlog.io/utterlog}/utterlog-api:${UTTERLOG_IMAGE_TAG:-latest}
    build: !reset null     # disable local build
    pull_policy: always

  web:
    image: ${UTTERLOG_IMAGE_PREFIX:-registry.utterlog.io/utterlog}/utterlog-web:${UTTERLOG_IMAGE_TAG:-latest}
    build: !reset null
    pull_policy: always
