{{define "_head"}}<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>{{.Site.Title}}</title>
</head>
<body style="margin:0;padding:0;background:#f4f6f9;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;color:#0d1a2d;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6f9;padding:40px 20px;"><tr><td align="center">
<table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.04);"><tr><td style="padding:40px 40px 36px;">

<!-- Brand -->
<table cellpadding="0" cellspacing="0" width="100%" style="margin-bottom:24px;"><tr>
<td width="40" valign="middle">
{{if .Site.Logo}}<img src="{{.Site.Logo}}" alt="{{.Site.Title}}" width="32" height="32" style="display:block;border-radius:2px;">{{else}}<div style="width:32px;height:32px;background:#0052d9;color:#fff;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;">{{.Site.FirstChar}}</div>{{end}}
</td>
<td valign="middle" style="padding-left:10px;">
<span style="font-size:18px;font-weight:700;color:#0d1a2d;letter-spacing:-0.3px;">{{.Site.Title}}</span>
</td>
<td valign="middle" align="right" style="font-size:11px;color:#8ea0b4;">{{.Site.Domain}}</td>
</tr></table>

<div style="height:1px;background:#e1e6eb;margin:24px 0;"></div>
{{end}}

{{define "_footer"}}
<!-- No-reply notice + Powered by -->
<div style="margin-top:28px;padding:8px 12px;background:#f5f7fa;border-left:3px solid #c8d3e0;font-size:11px;color:#9aa5b0;line-height:1.7;">
  ℹ 这是一封自动发送的邮件，请勿直接回复。
</div>
<p style="font-size:11px;color:#9aa5b0;margin:14px 0 0;line-height:1.7;">
  Powered by <a ses:no-track href="https://utterlog.com" style="color:#8ea0b4;text-decoration:none;">Utterlog</a> · {{.Site.Domain}}
</p>

</td></tr></table>
</td></tr></table>
</body>
</html>
{{end}}
