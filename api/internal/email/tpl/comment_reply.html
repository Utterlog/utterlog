{{template "_head" .}}

<p style="font-size:15px;line-height:1.7;color:#0d1a2d;margin:0 0 16px;">
  你好 <b>{{.RecipientName}}</b>，<b>{{.ReplierName}}</b> 回复了你在《{{.PostTitle}}》的评论
</p>

<p style="font-size:13px;line-height:1.8;color:#5a6b7f;margin:20px 0 6px;">你说的是：</p>
<div style="background:#f5f7fa;border-left:3px solid #c8d3e0;padding:14px 16px;margin:8px 0 16px;font-size:12px;line-height:1.7;color:#5a6b7f;">
  {{renderCommentContent .OriginalContent .Site.URL}}
</div>

<p style="font-size:13px;line-height:1.8;color:#5a6b7f;margin:0 0 6px;">{{.ReplierName}} 的回复：</p>
<div style="background:#f5f7fa;border-left:3px solid #0052d9;padding:14px 16px;margin:8px 0 16px;font-size:13px;line-height:1.7;color:#0d1a2d;">
  {{renderCommentContent .ReplyContent .Site.URL}}
</div>

<a ses:no-track target="_blank" rel="noopener noreferrer" href="{{.PostURL}}" style="display:inline-block;padding:10px 26px;font-size:13px;font-weight:500;color:#fff;background:#0052d9;text-decoration:none;margin:14px 0 0;">查看完整回复</a>

{{template "_footer_with_unsub" .}}
