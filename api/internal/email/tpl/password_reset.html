{{template "_head" .}}

<p style="font-size:15px;line-height:1.7;color:#0d1a2d;margin:0 0 16px;">
  🔐 你正在请求重置 <b>{{.Site.Title}}</b> 后台账号密码
</p>

<p style="font-size:14px;line-height:1.7;color:#0d1a2d;margin:0 0 18px;">
  Hi {{.UserName}}，点击下方按钮设置新密码（链接有效期 <b>{{.ExpireMins}} 分钟</b>）：
</p>

<a ses:no-track href="{{.ResetURL}}" style="display:inline-block;padding:12px 32px;font-size:14px;font-weight:500;color:#fff;background:#0052d9;text-decoration:none;margin:14px 0 0 0;">重置密码</a>

<p style="font-size:12px;line-height:1.7;color:#8ea0b4;margin:20px 0 0;">
  如果按钮无法点击，复制以下链接到浏览器：<br>
  <span style="word-break:break-all;color:#0052d9;">{{.ResetURL}}</span>
</p>

<div style="background:#fff7e6;border-left:3px solid #f59e0b;padding:12px 16px;margin:20px 0 0;font-size:12px;line-height:1.7;color:#664c12;">
  <b>安全提示</b>：如果不是你本人发起的请求，请直接忽略此邮件，无需任何操作；账号密码不会被改变。链接超过 {{.ExpireMins}} 分钟后自动失效。
</div>

{{template "_footer" .}}
