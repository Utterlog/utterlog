{{template "_head" .}}

<p style="font-size:15px;line-height:1.7;color:#0d1a2d;margin:0 0 16px;">
  🎉 你的 <b>{{.Site.Title}}</b> 站点已成功升级
</p>
<p style="font-size:13px;line-height:1.8;color:#5a6b7f;margin:0 0 12px;">
  后台使用的 Utterlog 引擎已更新到最新版本。
</p>

<div style="background:#eaf3ff;padding:28px 16px;text-align:center;margin:20px auto;max-width:300px;font-family:-apple-system,'SF Pro Display',sans-serif;font-size:22px;font-weight:600;letter-spacing:2px;color:#0d1a2d;">
  {{.Version}}
</div>

{{if .Highlights}}<p style="font-size:13px;line-height:1.8;color:#5a6b7f;margin:16px 0 8px;"><b>本次更新亮点：</b></p>
<ul style="margin:14px 0;padding:0 0 0 22px;">
{{range .Highlights}}<li style="font-size:13px;line-height:1.9;color:#0d1a2d;margin-bottom:4px;">{{.}}</li>{{end}}
</ul>{{end}}

{{if .ChangelogURL}}<a href="{{.ChangelogURL}}" style="display:inline-block;padding:10px 26px;font-size:13px;font-weight:500;color:#fff;background:#0052d9;text-decoration:none;margin:14px 0 0;">查看完整更新日志</a>{{end}}

<p style="font-size:12px;color:#8ea0b4;margin:20px 0 0;line-height:1.7;">
  如果升级后遇到任何问题，请到 <a href="{{.Site.AdminURL}}/backup" style="color:#0052d9;text-decoration:none;">后台 → 工具</a> 查看日志或恢复备份。
</p>

{{template "_footer" .}}
