name: Build & publish Docker images

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'api/**'
      - 'web/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

env:
  # Dual registries: GHCR (global, CDN) + registry.utterlog.io (first-party,
  # CN-friendly via CF + reverse proxy nodes). Install.sh prefers the
  # utterlog registry; users can opt into GHCR via UTTERLOG_IMAGE_PREFIX.
  GHCR_API: ghcr.io/utterlog/utterlog-api
  GHCR_WEB: ghcr.io/utterlog/utterlog-web
  UTTERLOG_API: registry.utterlog.io/utterlog/utterlog-api
  UTTERLOG_WEB: registry.utterlog.io/utterlog/utterlog-web
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  packages: write

jobs:
  api:
    name: API image
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 is required so `git describe --tags` below can find
      # the nearest tag. Default shallow clone omits tags and every build
      # on main ends up labeled "dev".
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to registry.utterlog.io
        uses: docker/login-action@v3
        with:
          registry: registry.utterlog.io
          username: utterlog
          password: ${{ secrets.UTTERLOG_REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_API }}
            ${{ env.UTTERLOG_API }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # VERSION — always a human-readable release label (v1.0.9).
      # On tag pushes: exactly the tag name.
      # On main pushes: the latest reachable tag (via git describe).
      # BUILD_COMMIT — 7-char short SHA, displayed as small subtitle
      # in the admin UI so you can still trace the exact build.
      - name: Compute version + commit
        id: verlabel
        run: |
          COMMIT=$(echo "${{ github.sha }}" | cut -c1-7)
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT"  >> "$GITHUB_OUTPUT"

      - name: Build & push to both registries
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile.prod
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.verlabel.outputs.version }}
            BUILD_COMMIT=${{ steps.verlabel.outputs.commit }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  web:
    name: Web image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to registry.utterlog.io
        uses: docker/login-action@v3
        with:
          registry: registry.utterlog.io
          username: utterlog
          password: ${{ secrets.UTTERLOG_REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_WEB }}
            ${{ env.UTTERLOG_WEB }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push to both registries
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile.prod
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=/api/v1
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
