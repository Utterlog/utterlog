name: Build & deploy docs site

# Mirrors landing-deploy.yml but for the separate docs/ project
# which renders to docs.utterlog.io. Triggered on docs/** changes.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci --no-audit --no-fund

      - name: Build static export
        working-directory: docs
        run: npm run build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.UTTERLOG_DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.UTTERLOG_DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync to docs.utterlog.io
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            docs/out/ \
            root@${{ secrets.UTTERLOG_DEPLOY_HOST }}:/opt/1panel/1panel/www/wwwroot/docs.utterlog.io/

      - name: Smoke test
        run: |
          sleep 3
          curl -fsS -o /dev/null -w "GET /          → %{http_code}\n" https://docs.utterlog.io/
          curl -fsS -o /dev/null -w "GET /install/  → %{http_code}\n" https://docs.utterlog.io/install/
          curl -fsS -o /dev/null -w "GET /update/   → %{http_code}\n" https://docs.utterlog.io/update/
