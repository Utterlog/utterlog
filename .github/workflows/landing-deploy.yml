name: Build & deploy landing page

# Builds the utterlog.io marketing site (Next.js static export) and
# rsyncs it to the server, along with install.sh / update.sh which are
# served from the same host. Triggered on any change to the landing/
# directory or to the installer scripts.

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/landing-deploy.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        working-directory: landing
        run: npm ci --no-audit --no-fund

      - name: Build static export
        working-directory: landing
        run: npm run build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.UTTERLOG_DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.UTTERLOG_DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync static site to utterlog.io
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            landing/out/ \
            root@${{ secrets.UTTERLOG_DEPLOY_HOST }}:${{ secrets.UTTERLOG_DEPLOY_PATH }}/

      - name: Smoke test
        run: |
          sleep 3
          curl -fsS -o /dev/null -w "GET /          → %{http_code}\n" https://utterlog.io/
          curl -fsS -o /dev/null -w "GET /install.sh→ %{http_code}\n" https://utterlog.io/install.sh
          curl -fsS -o /dev/null -w "GET /update.sh → %{http_code}\n" https://utterlog.io/update.sh
