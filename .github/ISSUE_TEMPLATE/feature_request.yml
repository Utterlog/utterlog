name: 功能请求
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 你遇到什么痛点？描述使用场景
      placeholder: 我在写长文章时希望能...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望的方案
      description: 具体设想是怎样的
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 有没有其他做法你考虑过？为什么不选它们？
  - type: dropdown
    id: scope
    attributes:
      label: 涉及范围
      multiple: true
      options:
        - 前端博客（web/）
        - 管理后台（api/admin/）
        - 后端 API（api/）
        - 主题
        - 插件
        - 部署
        - 文档
