services:
  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-utterlog}
      POSTGRES_USER: ${DB_USER:-utterlog}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-this-db-password}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./redisdata:/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./api:/app
      - ./api/public/uploads:/app/public/uploads
      - api_go_cache:/go/pkg/mod
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-utterlog}
      - DB_USER=${DB_USER:-utterlog}
      - DB_PASSWORD=${DB_PASSWORD:-change-this-db-password}
      - DB_PREFIX=${DB_PREFIX:-ul_}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-long-random-string-at-least-32-chars}
      - APP_URL=${APP_URL:-http://localhost:8080}
      - STORAGE_DRIVER=${STORAGE_DRIVER:-local}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_REGION=${S3_REGION:-auto}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL:-}
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
      - INTERNAL_API_URL=${INTERNAL_API_URL:-http://api:8080/api/v1}
    depends_on:
      - api

volumes:
  api_go_cache:
