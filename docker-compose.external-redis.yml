# ============================================================
# Utterlog — external Redis overlay (postgres still bundled)
# ------------------------------------------------------------
# Mid-step between full bundled and full external:
#   - Postgres stays inside utterlog's compose (because pgvector,
#     plus typically the user has real data here that can't be
#     trivially moved).
#   - Redis is just a cache — point at a host-bound redis (1Panel,
#     宝塔, AAPanel managed, or any system redis on 127.0.0.1:6379)
#     so the host doesn't run two redis processes side by side.
#
# Usage (managed by scripts/deploy.sh when UTTERLOG_REDIS_MODE=
# external and UTTERLOG_DB_MODE=bundled):
#   docker compose \
#     -f docker-compose.prod.yml \
#     -f docker-compose.pull.yml \
#     -f docker-compose.external-redis.yml \
#     up -d
#
# Required .env vars:
#   REDIS_HOST=host.docker.internal     # resolved to host gateway
#   REDIS_PORT=6379
#   REDIS_PASSWORD=...                  # leave empty if your redis has no auth
#
# Why host.docker.internal:
#   - Linux: resolved via the extra_hosts:host-gateway alias below.
#   - macOS / Windows: built-in by Docker Desktop.
#   - Same .env works across platforms.
# ============================================================

services:
  redis:
    profiles: ["disabled"]

  api:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Base prod file's depends_on includes `redis: service_healthy`,
    # which would deadlock now that the redis service has profile
    # "disabled". `!reset` here means: throw away the inherited dict
    # entirely and use this one. We re-list postgres + web so api
    # still waits for postgres to be healthy on cold start.
    depends_on: !reset
      postgres:
        condition: service_healthy
      web:
        condition: service_started

  web:
    extra_hosts:
      - "host.docker.internal:host-gateway"
